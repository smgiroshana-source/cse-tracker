name: CSE Tracker Auto-Update

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth google-api-python-client PyPDF2 requests playwright
          playwright install chromium --with-deps

      - name: Run CSE Tracker
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python cse_tracker_v9.py

      - name: Keepalive commit (Mondays only)
        if: success()
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            mkdir -p .github
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-keepalive.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/last-keepalive.txt
            if ! git diff --cached --quiet; then
              git commit -m "chore: keepalive [skip ci]"
              git push
            fi
          fi
